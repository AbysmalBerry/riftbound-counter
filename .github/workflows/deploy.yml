name: Deploy Riftbound Counter to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # The app mounts at khairimeske.cloud/riftbound, which nginx serves from a
      # subfolder of the portfolio's web root. The portfolio's own deploy also
      # tar-extracts into that root without deleting, so the two coexist.
      #
      # appleboy/scp-action opens several SSH connections in quick succession and
      # the VPS edge drops the later ones. One piped tar-over-ssh connection
      # stays under the throttle (same approach as the other two deploys).
      # VPS_SSH_TARGET (e.g. user@host) is a secret rather than a literal: this
      # repo is public, and there is no reason to publish which account CI logs
      # in as. Secrets are also masked in run logs; `vars` would not be.
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_TARGET: ${{ secrets.VPS_SSH_TARGET }}
        run: |
          test -n "$SSH_KEY" || { echo "::error::VPS_SSH_PRIVATE_KEY is not set"; exit 1; }
          test -n "$SSH_TARGET" || { echo "::error::VPS_SSH_TARGET is not set"; exit 1; }
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_deploy
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          tar -C dist -czf - . | ssh -i ~/.ssh/id_deploy \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "$SSH_TARGET" \
            "mkdir -p /opt/khairimeske-web/dist/riftbound && tar -xzf - -C /opt/khairimeske-web/dist/riftbound"
