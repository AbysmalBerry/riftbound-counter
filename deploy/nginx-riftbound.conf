# Riftbound Counter — nginx location blocks for khairimeske.cloud/riftbound
#
# The app is a static SPA served from a subfolder of the portfolio's web root
# (/opt/khairimeske-web/dist/riftbound). It is NOT a separate container.
#
# Install:
#   1. Copy security-headers.conf to /opt/khairimeske-web/security-headers.conf
#      (and make sure that path is readable inside the khairimeske-web container
#      — it must be on a mounted volume, same as nginx.conf itself).
#   2. Add this line to the `http { ... }` context (NOT the server block —
#      limit_req_zone is only valid at http level), e.g. next to any other
#      limit_req_zone directives. It backs the rate limit on the gallery proxy:
#
#        limit_req_zone $binary_remote_addr zone=rb_gallery:10m rate=20r/m;
#
#   3. Paste the location blocks below into the portfolio server block in
#      /opt/khairimeske-web/nginx.conf, ABOVE its `location / { ... }`.
#   4. docker exec khairimeske-web nginx -t && docker exec khairimeske-web nginx -s reload
#
# nginx picks the longest matching prefix, so these win over the portfolio's
# `location /` fallback regardless of where they sit in the file — but keeping
# them above it makes the intent obvious to the next reader.
#
# Every block below includes security-headers.conf. That is deliberate, not
# copy-paste sloppiness: `add_header` does not inherit into a level that defines
# any add_header of its own, so a block that only set Cache-Control would
# silently drop the site's security headers. See security-headers.conf.

# Bare /riftbound → /riftbound/ so relative URLs and the SW scope resolve right.
location = /riftbound {
  return 301 /riftbound/;
}

# In-app "Update cards" proxy. The official gallery (playriftbound.com) sends no
# CORS header, so the browser can't fetch it directly — this forwards the request
# server-side. Mirrors the Vite dev proxy in vite.config.ts.
#
# SECURITY — this is a server-side relay to a third-party host, so it is locked
# down rather than left wide open:
#   * The upstream host is HARD-CODED. A visitor controls only the path, never
#     the destination, so this is not an open proxy and can't reach the internal
#     network (no SSRF).
#   * The regex below only matches the TWO exact endpoints the app reads (the
#     gallery page and its card-data JSON). Any other /riftbound/gallery/* path
#     404s locally via the catch-all block — nothing else is ever relayed.
#   * GET only, rate-limited per client IP, and upstream Set-Cookie is stripped
#     so the third party can't plant cookies on our domain. Short timeouts stop
#     a slow upstream from tying up connections.
#
# Both blocks must come before `location /riftbound/`. The regex location is
# evaluated ahead of prefix matches, so the two valid endpoints proxy while the
# prefix catch-all handles everything else under /gallery/.

# Catch-all: any /gallery/ path that ISN'T one of the two real endpoints is
# refused here (no relay, no SPA fallback).
location /riftbound/gallery/ {
  include /opt/khairimeske-web/security-headers.conf;
  return 404;
}

# The two real endpoints → proxied to playriftbound.com.
location ~ ^/riftbound/gallery/(en-us/card-gallery/|_next/data/[^/]+/en-us/card-gallery\.json)$ {
  include /opt/khairimeske-web/security-headers.conf;

  limit_except GET { deny all; }            # the app only ever GETs
  limit_req zone=rb_gallery burst=10 nodelay;  # cap relay abuse (zone: see http{})

  # Strip the /riftbound/gallery prefix, then forward the bare path. A regex
  # location can't carry a URI on proxy_pass, so the rewrite does the stripping.
  rewrite ^/riftbound/gallery/(.*)$ /$1 break;
  proxy_pass https://playriftbound.com;
  proxy_set_header Host playriftbound.com;
  proxy_ssl_server_name on;
  proxy_set_header User-Agent "Mozilla/5.0 (RiftboundCounter)";

  # Don't let the upstream set cookies scoped to our domain.
  proxy_hide_header Set-Cookie;
  proxy_hide_header Set-Cookie2;

  proxy_connect_timeout 5s;
  proxy_read_timeout 15s;

  # Optional hardening: verify the upstream TLS cert (removes the MITM-forged-
  # data risk). Needs a CA bundle readable in the container. Enable if desired:
  #   proxy_ssl_verify on;
  #   proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  #   proxy_ssl_verify_depth 3;
}

# Hashed build assets: cache forever. Must come before `location /riftbound/`
# (longer prefix wins) or these would inherit the SPA fallback instead.
location /riftbound/assets/ {
  include /opt/khairimeske-web/security-headers.conf;
  expires 1y;
  add_header Cache-Control "public, immutable" always;
}

# Never cache the shell or the service worker — otherwise a stale sw.js pins
# clients to an old build.
location = /riftbound/index.html {
  include /opt/khairimeske-web/security-headers.conf;
  add_header Cache-Control "no-cache" always;
}
location = /riftbound/sw.js {
  include /opt/khairimeske-web/security-headers.conf;
  add_header Cache-Control "no-cache" always;
}
location = /riftbound/manifest.webmanifest {
  include /opt/khairimeske-web/security-headers.conf;
  add_header Cache-Control "no-cache" always;
}

# SPA fallback — /riftbound/play and /riftbound/setup are client-side routes,
# so anything that isn't a real file resolves to the app shell.
location /riftbound/ {
  include /opt/khairimeske-web/security-headers.conf;
  try_files $uri $uri/ /riftbound/index.html;
}
