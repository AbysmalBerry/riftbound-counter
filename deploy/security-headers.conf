# Security headers for the Riftbound Counter, included by each location block
# in nginx-riftbound.conf. Install alongside it:
#   /opt/khairimeske-web/security-headers.conf
#
# WHY THIS IS A SEPARATE FILE AND INCLUDED EVERYWHERE:
# nginx `add_header` is NOT additive across levels. From the docs: directives are
# inherited from the previous configuration level *if and only if there are no
# add_header directives defined on the current level*. So a location block that
# sets a single `add_header Cache-Control ...` silently drops every add_header
# inherited from the server block — including its security headers. Including
# this file in each location that sets any header keeps them explicit and intact
# regardless of what the surrounding portfolio config does.
#
# `always` makes them apply to error responses (4xx/5xx) too, not just 2xx/3xx.

# Content-Security-Policy: the app has no HTML-injection sinks, so it can afford a
# strict policy. Its only external dependency is card art for the flashcard quiz.
#   style-src 'unsafe-inline' is required: React writes inline style attributes
#     (score transforms, confetti pieces). It permits no script execution.
#   img-src data: is required: the film-grain texture in index.css is an inline
#     SVG data URI.
#   img-src https://cmsassets.rgpub.io is required: the flashcard quiz loads
#     Riftbound card art from Riot's Sanity image CDN.
# Verified against the real bundle — the app runs clean with zero violations.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cmsassets.rgpub.io; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'; frame-ancestors 'none'" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "same-origin" always;
# No camera/mic/geo/payment use anywhere in the app.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
